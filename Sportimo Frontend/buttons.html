<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
</head>
<body>
    <button class="subscribe"
            onclick="alert('welcome to sportimo')">Subscribe</button>
    <button class="for-players"
            onclick="alert('you are a player')">For players</button>
    <button class="for-clubs"
            onclick="alert('you are a club manager')">For clubs</button>

<style>
    .subscribe {
        background-color: rgb(206, 62, 22);
        color: white;
        border: none;
        height: 25px;
        width: 100px;
        border-radius: 2.5px;
        cursor: pointer;
    }
    .for-players {
        background-color: white;
        color: rgb(206, 62, 22);
        border: 2px solid rgb(206, 62, 22);
        height: 25px;
        width: 100px;
        border-radius: 12.5px;
        cursor: pointer;
        font-weight: bold;
    }
    .for-clubs {
        background-color: white;
        color: rgb(206, 62, 22);
        border: 2px solid rgb(206, 62, 22);
        height: 25px;
        width: 100px;
        border-radius: 12.5px;
        cursor: pointer;
        font-weight: bold;
    }

</style>
    
</body>
</html>
